# Generated by cuenv - do not edit manually
# Regenerate with: cuenv sync ci

name: cuenv-release
on:
  release:
    types:
    - published
  workflow_dispatch:
    inputs:
      tag_name:
        description: Tag to release (e.g., v0.16.0)
        required: true
        type: string
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true
permissions:
  contents: write
  id-token: write
jobs:
  build-cuenv-namespace-profile-cuenv-macos-arm64:
    name: build.cuenv (namespace-profile-cuenv-macos-arm64)
    runs-on: namespace-profile-cuenv-macos-arm64
    timeout-minutes: 30
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 2
    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@v16
      with:
        extra-conf: accept-flake-config = true
    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.9
      env:
        RUSTC_WRAPPER: sccache
        SCCACHE_DIR: ${{ runner.temp }}/sccache
    - name: Export sccache environment
      run: echo "SCCACHE_DIR=${{ runner.temp }}/sccache" >> $GITHUB_ENV && echo "RUSTC_WRAPPER=$SCCACHE_PATH" >> $GITHUB_ENV
    - name: Setup Cachix
      uses: cachix/cachix-action@v17
      with:
        authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
        name: cuenv
    - name: Build cuenv (nix)
      run: |-
        . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
        nix build .#cuenv -L --accept-flake-config
        echo "$(pwd)/result/bin" >> "$GITHUB_PATH" 2>/dev/null || echo "$(pwd)/result/bin" >> "$BUILDKITE_ENV_FILE" 2>/dev/null || true
        ./result/bin/cuenv sync ci
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
