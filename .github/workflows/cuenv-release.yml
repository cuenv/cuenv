# Generated by cuenv - do not edit manually
# Regenerate with: cuenv sync ci

name: cuenv-release
on:
  release:
    types:
    - published
  workflow_dispatch:
    inputs:
      tag_name:
        description: Tag to release (e.g., v0.16.0)
        required: true
        type: string
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true
permissions:
  contents: write
  checks: write
  pull-requests: write
  packages: write
  id-token: write
jobs:
  build-cuenv-macos-latest:
    name: build.cuenv (macos-latest)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 2
    - name: Install Nix
      uses: DeterminateSystems/determinate-nix-action@v3
      with:
        extra-conf: accept-flake-config = true
    - name: Setup FlakeHub Cache
      uses: DeterminateSystems/flakehub-cache-action@main
    - name: Build cuenv (nix)
      run: |-
        . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
        nix build .#cuenv -L --accept-flake-config
        echo "$(pwd)/result/bin" >> "$GITHUB_PATH" 2>/dev/null || echo "$(pwd)/result/bin" >> "$BUILDKITE_ENV_FILE" 2>/dev/null || true
        ./result/bin/cuenv sync ci
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  build-cuenv-ubuntu-24-04-arm:
    name: build.cuenv (ubuntu-24-04-arm)
