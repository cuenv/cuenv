# Generated by cuenv - do not edit manually
# Regenerate with: cuenv sync ci

name: cuenv-sync-check
on:
  push:
    branches:
    - main
    paths:
    - .agents/skills/**
    - .github/workflows/cuenv-sync-check.yml
    - AGENTS.md
    - AGENTS.md/**
    - CLAUDE.md
    - CLAUDE.md/**
    - contrib/**
    - cue.mod/**
    - docs/design/specs/schema-coverage-matrix.md
    - docs/design/specs/schema-coverage-matrix.md/**
    - docs/src/content/docs/agents/**
    - docs/src/content/docs/reference/schema/**
    - env.cue
    - env.cue/**
    - llms.txt
    - llms.txt/**
    - prompts/**
    - readme.md
    - readme.md/**
    - schema/**
    - scripts/check-schema-docs.sh
    - scripts/check-schema-docs.sh/**
  pull_request:
    branches:
    - main
    paths:
    - .agents/skills/**
    - .github/workflows/cuenv-sync-check.yml
    - AGENTS.md
    - AGENTS.md/**
    - CLAUDE.md
    - CLAUDE.md/**
    - contrib/**
    - cue.mod/**
    - docs/design/specs/schema-coverage-matrix.md
    - docs/design/specs/schema-coverage-matrix.md/**
    - docs/src/content/docs/agents/**
    - docs/src/content/docs/reference/schema/**
    - env.cue
    - env.cue/**
    - llms.txt
    - llms.txt/**
    - prompts/**
    - readme.md
    - readme.md/**
    - schema/**
    - scripts/check-schema-docs.sh
    - scripts/check-schema-docs.sh/**
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
  checks: write
  pull-requests: write
  id-token: write
jobs:
  cuenv-sync-check:
    name: cuenv-sync-check
    runs-on: namespace-profile-cuenv-linux-x86
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 2
    - name: Setup Namespace Nix Cache
      uses: namespacelabs/nscloud-cache-action@v1
      with:
        cache: nix
    - name: Build cuenv (nix)
      run: |-
        . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
        nix build .#cuenv -L --accept-flake-config
        echo "$(pwd)/result/bin" >> "$GITHUB_PATH" 2>/dev/null || echo "$(pwd)/result/bin" >> "$BUILDKITE_ENV_FILE" 2>/dev/null || true
        ./result/bin/cuenv sync ci
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: 'Run pipeline: sync-check'
      run: cuenv ci --pipeline sync-check --path .
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_ACTOR: ${{ github.actor }}
        GITHUB_REF_TYPE: ${{ github.ref_type }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
