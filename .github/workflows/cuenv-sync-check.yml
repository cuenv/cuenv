# Generated by cuenv - do not edit manually
# Regenerate with: cuenv ci --format github

name: cuenv-sync-check
on:
  push:
    branches:
    - main
    paths:
    - .github/workflows/cuenv-sync-check.yml
    - contrib/**
    - cue.mod/**
    - env.cue
    - schema/**
  pull_request:
    branches:
    - main
    paths:
    - .github/workflows/cuenv-sync-check.yml
    - contrib/**
    - cue.mod/**
    - env.cue
    - schema/**
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
  checks: write
  pull-requests: write
  id-token: write
jobs:
  cuenv-sync-check:
    name: cuenv-sync-check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 2
    - name: Install Nix
      uses: DeterminateSystems/determinate-nix-action@v3
      with:
        extra-conf: accept-flake-config = true
    - name: Setup FlakeHub Cache
      uses: DeterminateSystems/flakehub-cache-action@main
    - name: Build cuenv (nix)
      run: |-
        . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
        nix build .#cuenv -L --accept-flake-config
        echo "$(pwd)/result/bin" >> "$GITHUB_PATH" 2>/dev/null || echo "$(pwd)/result/bin" >> "$BUILDKITE_ENV_FILE" 2>/dev/null || true
        ./result/bin/cuenv sync ci
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: 'Run pipeline: sync-check'
      run: cuenv ci --pipeline sync-check --path .
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
