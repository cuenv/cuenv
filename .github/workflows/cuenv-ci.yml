# Generated by cuenv - do not edit manually
# Regenerate with: cuenv sync ci

name: cuenv-ci
on:
  push:
    branches:
    - main
    paths:
    - .github/workflows/cuenv-ci.yml
    - Cargo.lock
    - Cargo.toml
    - _tests/**
    - contrib/**
    - crates/**
    - cue.mod/**
    - deny.toml
    - env.cue
    - examples/**
    - features/**
    - flake.lock
    - flake.nix
    - schema/**
  pull_request:
    branches:
    - main
    paths:
    - .github/workflows/cuenv-ci.yml
    - Cargo.lock
    - Cargo.toml
    - _tests/**
    - contrib/**
    - crates/**
    - cue.mod/**
    - deny.toml
    - env.cue
    - examples/**
    - features/**
    - flake.lock
    - flake.nix
    - schema/**
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
  checks: write
  pull-requests: write
  id-token: write
jobs:
  checks-audit:
    name: checks.audit
    runs-on: depot-ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 2
    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@v16
      with:
        extra-conf: accept-flake-config = true
    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.9
      env:
        RUSTC_WRAPPER: sccache
        SCCACHE_DIR: ${{ runner.temp }}/sccache
    - name: Export sccache environment
      run: echo "SCCACHE_DIR=${{ runner.temp }}/sccache" >> $GITHUB_ENV && echo "RUSTC_WRAPPER=$SCCACHE_PATH" >> $GITHUB_ENV
    - name: Setup Cachix
      uses: cachix/cachix-action@v17
      with:
        authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
        name: cuenv
    - name: checks.audit
      run: nix build .#checks.x86_64-linux.cuenv-audit -L --accept-flake-config
      working-directory: .
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
