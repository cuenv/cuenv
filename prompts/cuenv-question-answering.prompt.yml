name: cuenv Q&A
description: Test if LLM can accurately answer cuenv questions using llms.txt context
model: openai/gpt-4.1-mini
messages:
  - role: system
    content: |
      Answer questions about cuenv accurately and concisely using only the provided documentation.
      If the answer is not in the documentation, say so.
      When the schema advertises a partial or schema-only feature, state that limitation instead of presenting it as fully supported.

      Documentation:
      - cuenv projects are configured with an `env.cue` file, normally using `package cuenv` and `import "cuenv.dev/schema"`.
      - Environment variables live under `env:`. Schema-first env examples can use `env: schema.#Env & { ... }`.
      - Single executable tasks use `schema.#Task` with either top-level `command`/`args` or top-level `script`/`scriptShell`; do not mix command and script modes.
      - For inline shell logic, use `script: """..."""`. If a repo already has `scripts/`, `bin/`, `ci/`, or many `.sh`, `.fish`, or `.nu` scripts, prefer CUE file embedding with file-level `@extern(embed)` and `script: _ @embed(file=scripts/name.sh,type=text)`, plus `inputs` for the script path.
      - Parallel tasks use `schema.#TaskGroup & { type: "group", ... }` with named child tasks. Each child runs independently. Ordered task sequences use `schema.#TaskSequence & [ ... ]`.
      - Task dependencies use `dependsOn` with CUE references to other tasks or images, for example `dependsOn: [test]`.
      - `cuenv exec` runs an arbitrary command with the validated cuenv environment and resolved secrets.
      - `cuenv task` runs named CUE-defined tasks with dependencies, parallel execution, and content-aware caching.
      - Secrets are resolved at runtime and redacted from logs. `schema.#ExecSecret` and `schema.#OnePasswordRef` are implemented. AWS, GCP, and Vault secret schema shapes exist, but their runtime resolvers are not registered by default.
      - GitHub Actions workflow generation requires `ci.providers: ["github"]` and is generated with `cuenv sync ci`.
      - `schema.#ContainerImage` exists, but `cuenv build` currently validates and lists image definitions; image build backends are not complete.
  - role: user
    content: "{{question}}"
testData:
  - question: "How do I run tasks in parallel with cuenv?"
    expected: "Use object syntax with named keys in a task group - each key runs in parallel. Arrays run sequentially."
  - question: "How are secrets handled in cuenv?"
    expected: "Secrets are resolved at runtime and redacted. Exec secrets and 1Password are implemented; AWS, GCP, and Vault have schema shapes but are not registered by default."
  - question: "What is the difference between cuenv exec and cuenv task?"
    expected: "cuenv exec runs any command with validated environment and secrets. cuenv task runs named tasks defined in CUE with dependencies, parallelism, and caching."
  - question: "How do I define task dependencies in cuenv?"
    expected: "Use the dependsOn field in a task definition with CUE references to tasks or images that must complete first."
  - question: "What file do I create to configure cuenv?"
    expected: "Create an env.cue file with package cuenv, import the schema, and define your env and tasks."
  - question: "How do I generate GitHub Actions workflows?"
    expected: "Configure ci.providers with github and run cuenv sync ci."
  - question: "Can cuenv build container images from schema.#ContainerImage?"
    expected: "The schema exists, but cuenv build currently validates and lists image definitions; image build backends are not complete."
  - question: "How should I run an existing scripts/release.sh file from a cuenv task?"
    expected: "Use a script task with CUE embed: add file-level @extern(embed), set script to _ @embed(file=scripts/release.sh,type=text), set scriptShell, and include scripts/release.sh in inputs."
evaluators:
  - name: Similarity to expected
    uses: github/similarity
