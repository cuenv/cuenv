[package]
name = "cuenv-tools-oci"
version.workspace = true
edition = "2024"
rust-version = "1.85.0"
license = "MIT"
repository = "https://github.com/cuenv/cuenv"
description = "OCI registry tool provider for cuenv"
readme.workspace = true
keywords.workspace = true
categories.workspace = true

[dependencies]
# OCI registry operations
oci-distribution = { workspace = true }

# Compression and archiving
flate2 = "1.1"
tar = "0.4"

# Cryptography (for digest verification)
sha2 = "0.10"

# Async runtime
tokio = { workspace = true, features = ["fs", "io-util"] }

# Error handling
thiserror = { workspace = true }

# Logging
tracing = { workspace = true }

# Serialization (for manifest parsing)
serde = { workspace = true }
serde_json = { workspace = true }

# Directories
dirs = { workspace = true }

# Core types
cuenv-core = { workspace = true }

# Async trait
async-trait = { workspace = true }

[dev-dependencies]
temp-env = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
tempfile = { workspace = true }
